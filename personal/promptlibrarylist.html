<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- 防止HTML页面缓存 -->
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Expires" content="0" />
    <title>Expert-Level AI Prompt Library</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link href="./dist/css/tabler.min.css?1692870487" rel="stylesheet" />
    <script src="./js/vue.js"></script>
    <link rel="stylesheet" type="text/css" href="../css/neon.css" />

    <style>
      .pageloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #222;
      }

      .pageloader2 {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.3);
      }

      .content:before {
        content: "";
        position: fixed;
        top: 0px;
        left: 0px;
        width: 100%;
        height: 100%;
        background: #000;
      }

      .content {
        position: relative;
        padding: 32px 20px 20px 20px;
        background: transparent;
        min-height: 100vh;
      }

      .library {
        position: relative;
        max-width: 1280px;
        margin: 0 auto;
      }

      .library_header {
        width: 100%;
        align-items: center;
        margin-bottom: 20px;
      }

      .header_left {
        color: rgb(209 213 219);
        font-size: 16px;
      }

      .header_cen {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-bottom: 40px;
        font-size: 56px;
        color: #fff;
        text-align: center;
        font-weight: bold;
      }

      .header_cen div {
        text-align: left;
      }

      .header_cen img {
        width: 60px;
        margin-top: 15px;
        margin-right: 10px;
        flex-shrink: 0;
      }

      .library_back {
        display: flex;
        align-items: center;
        cursor: pointer;
        color: rgb(209 213 219);
        font-size: 14px;
        height: 40px !important;
        margin-left: 14px;
        padding: 0 16px !important;
        border-color: rgb(175 177 182 / var(--tw-border-opacity)) !important;
      }

      .library_back svg {
        width: 16px !important;
        height: 16px !important;
        margin-right: 4px;
      }

      .header_right {
        width: 100%;
      }

      .page-title {
        font-size: 30px;
        margin: 0;
        font-weight: bold;
        font-family: "微软雅黑", "Microsoft YaHei", "Arial", sans-serif;
        color: #fff;
      }

      .right_btn {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 28px;
      }

      .bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #00000099;
      }

      .search_box {
        width: 100%;
        /* border: 1px solid rgba(255, 255, 255, 0.15);
			background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(40, 40, 40, 0.4) 100%);
			box-shadow: rgba(0, 0, 0, 0.6) 0px 4px 16px 0px;
			border-radius: 12px; */
        position: relative;
      }

      .search_input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: #fff;
        font-size: 14px;
        padding: 8px 80px 8px 12px;
        height: 40px;
      }

      .search_input::placeholder {
        color: rgb(156 163 175);
      }

      .search_close {
        color: rgb(156 163 175);
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        right: 5px;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      .search_close svg {
        width: 18px;
        height: 18px;
      }

      .search_close:hover {
        background: #ffffff1a;
      }

      .search_btn {
        height: 40px;
        justify-content: center;
        align-items: center;
        margin-left: 14px;
        cursor: pointer;
      }

      .cut_btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.8) 0%,
          rgba(40, 40, 40, 0.6) 100%
        );
        border-color: rgba(255, 255, 255, 0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 14px;
        cursor: pointer;
        box-shadow: rgba(0, 0, 0, 0.3) 0px 4px 16px 0px;
        flex-shrink: 0;
      }

      .cut_btn:hover {
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .search_btn svg {
        width: 18px !important;
        height: 18px !important;
        --tw-text-opacity: 1;
        color: rgb(0 229 153 / var(--tw-text-opacity));
      }

      .cut_btn svg {
        width: 18px;
        height: 18px;
        color: #fff;
      }

      .cut_btn {
        margin-right: 13px;
        margin-left: 0;
      }

      .library_box {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 36px;
      }

      .item {
        overflow: hidden;
        transition: transform 0.5s ease;
        cursor: pointer;
        border-radius: 8px;
      }

      .none {
        display: none;
      }

      .item_b {
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .new_tips {
        background: linear-gradient(
          135deg,
          rgba(220, 38, 38, 0.9) 0%,
          rgba(239, 68, 68, 0.9) 100%
        );
        color: #fff;
        font-weight: bold;
        font-size: 12px;
        padding: 0px 8px 2px 8px;
        border-radius: 10px;
        margin-bottom: 8px;
      }

      .item_b .title {
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 8px;
        transition: transform 0.5s ease;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item_b .text {
        color: rgb(209 213 219);
        font-size: 14px;
        margin-bottom: 8px;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item_b .browse {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        color: #9ca3af;
        font-size: 14px;
      }

      .item_b .browse svg {
        width: 14px !important;
        height: 14px !important;
        margin-right: 4px;
        margin-top: 2px;
      }

      .no_data {
        width: 100%;
        text-align: center;
        font-size: 14px;
        color: #fff;
        padding: 50px 0;
        width: 100%;
      }

      .Top_Nav {
        position: relative;
        z-index: 9;
      }

      .page-body {
        margin-top: 0 !important;
      }

      .search-holder {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 68px 0 32px 0;
      }

      .checkboxes-holder {
        column-gap: 20px;
        row-gap: 20px;
        justify-content: flex-start;
        align-items: center;
        display: flex;
      }

      .premium {
        background: rgb(0 229 153);
        padding: 8px 16px;
        border-radius: 8px;
      }

      .free {
        padding: 8px 16px;
        border-radius: 8px;
      }

      .checkbox-field {
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .dot_box {
        border: 1px solid #fff;
        width: 25px;
        height: 25px;
        border-radius: 25px;
        margin-right: 8px;
        padding: 5px;
      }

      .dot_ac {
        background: #fff;
        width: 100%;
        height: 100%;
        border-radius: 25px;
      }

      .uplock {
        position: absolute;
        bottom: 16px;
        right: 16px;
      }

      @media screen and (max-width: 1200px) {
        .library_box {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 768px) {
        .content {
          padding: 10px 10px 10px;
        }

        .right_btn {
          margin-top: 0;
        }

        .library_box {
          grid-template-columns: repeat(1, minmax(0, 1fr));
          gap: 1rem;
          margin-top: 20px;
        }

        .header_cen {
          font-size: 24px;
        }

        .header_cen img {
          margin-top: 4px;
        }

        .Left_Nav {
          position: relative;
          z-index: 999;
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="pageloader">
      <div class="container container-slim py-4">
        <div class="text-center">
          <div class="text-white mb-3">Loading…</div>
          <div class="progress progress-sm">
            <div class="progress-bar progress-bar-indeterminate"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="page">
      <!-- Navbar -->
      <div id="header"></div>
      <div class="page-wrapper">
        <div class="page-body">
          <div id="vue_app">
            <div class="pageloader2" v-if="isLoading">
              <div class="container container-slim py-4">
                <div class="text-center">
                  <div class="text-white mb-3">Loading…</div>
                  <div class="progress progress-sm">
                    <div class="progress-bar progress-bar-indeterminate"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="content">
              <div class="bg"></div>
              <div class="library">
                <div class="library_header">
                  <div class="header_box">
                    <div class="header_left">
                      <div
                        class="flex"
                        style="justify-content: end; width: 100%"
                      >
                        <div
                          class="library_back inline-flex cursor-pointer items-center justify-center font-bold !leading-none text-center whitespace-nowrap rounded-full transition-colors duration-200 outline-none h-8 px-4 text-sm tracking-extra-tight px-4.5 whitespace-nowrap border font-semibold border-gray-new-70 hover:border-gray-new-50 dark:border-gray-new-30 dark:hover:border-gray-new-40"
                          @click="libraryBack"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-arrow-left w-5 h-5"
                          >
                            <path d="m12 19-7-7 7-7"></path>
                            <path d="M19 12H5"></path>
                          </svg>
                          {{isEn?'BACK':'返回'}}
                        </div>
                      </div>

                      <div class="header_cen">
                        <img :src="logoUrl" alt="" />
                        <div>
                          {{count+'+ '}} {{isEn?'Prompts for ' +
                          NameEN:'个关于'+NameCN+'的专家级提示词'}}
                        </div>
                      </div>
                    </div>

                    <div class="header_right">
                      <div class="right_btn">
                        <div
                          class="search_box search_box max-w-full overflow-hidden rounded-full border border-gray-new-15 bg-black-new"
                        >
                          <input
                            class="search_input"
                            v-model="libraryName"
                            :placeholder="isEn?'Search prompt name or keywords...':'搜索提示词名称或关键字...'"
                            type="text"
                            @keyup.enter="searchLibrary"
                          />
                          <div class="search_close" @click="deleteInput">
                            <svg
                              xmlns="http://www.w3.org/2000/svg"
                              width="24"
                              height="24"
                              viewBox="0 0 24 24"
                              fill="none"
                              stroke="currentColor"
                              stroke-width="2"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              class="lucide lucide-x w-4 h-4 text-gray-400"
                            >
                              <path d="M18 6 6 18"></path>
                              <path d="m6 6 12 12"></path>
                            </svg>
                          </div>
                        </div>
                        <div
                          class="search_btn flex h-9 items-center whitespace-nowrap rounded-full px-6 font-medium tracking-extra-tight border transition-colors duration-200 hover:text-green-45 border-[#1B2C2E] bg-[#132628]/50 text-green-45"
                          @click="searchLibrary"
                        >
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-search w-5 h-5 text-white"
                          >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                          </svg>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="search-holder" v-if="!isVip">
                    <div class="checkboxes-holder">
                      <label
                        class="checkbox-field free w-radio"
                        @click="selectChage(1)"
                      >
                        <div class="dot_box">
                          <div :class="isSelect == 1?'dot_ac':''"></div>
                        </div>
                        <span
                          class="checkbox-label w-form-label"
                          for="filterRadioFree"
                          >Free</span
                        >
                      </label>
                      <label
                        class="checkbox-field premium w-radio"
                        @click="selectChage(2)"
                      >
                        <div class="dot_box">
                          <div :class="isSelect == 2?'dot_ac':''"></div>
                        </div>
                        <span
                          class="checkbox-label w-form-label"
                          for="filterRadioPremium"
                          >Premium</span
                        >
                      </label>
                    </div>
                  </div>

                  <div class="library_box">
                    <div
                      class="item bg-[#080808]"
                      v-for="(item, index) in libraryDataSorted"
                      :key="index"
                      @click="goSubDetail(item.PromptID)"
                    >
                      <div
                        class="group relative block size-full rounded-lg bg-[#080808]"
                      >
                        <div class="relative z-10">
                          <div class="item_b">
                            <div class="title">
                              <img
                                style="
                                  width: 18px;
                                  height: 18px;
                                  margin-bottom: 5px;
                                "
                                src="https://hrflagfile.oss-cn-hangzhou.aliyuncs.com/Web/aiprompts/%E9%97%AA%E7%94%B5.svg"
                                alt=""
                              />
                              {{isEn?item.Title_EN:item.Title_CN}}
                            </div>
                            <div class="text">
                              <div
                                v-html="isEn?item.ValueProposition_EN:item.ValueProposition_CN"
                              ></div>
                            </div>
                            <div class="browse" v-if="Number(item.ViewsNum)>0">
                              <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-eye w-4 h-4"
                              >
                                <path
                                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                                ></path>
                                <circle cx="12" cy="12" r="3"></circle>
                              </svg>
                              {{item.ViewsNum}}
                            </div>
                          </div>
                        </div>
                        <span
                          class="pointer-events-none absolute inset-0 overflow-hidden rounded-[inherit] opacity-0 transition-opacity duration-300 group-hover:opacity-100"
                          ><span
                            class="absolute -left-4 -top-20 h-[235px] w-[165%] rounded-full bg-[#166B70] opacity-20 blur-3xl"
                          ></span
                          ><span
                            class="absolute -right-3 -top-40 h-[250px] w-[60%] rotate-45 rounded-full bg-[#48C2CB] opacity-30 blur-3xl"
                          ></span></span
                        ><span
                          class="pointer-events-none absolute inset-0 rounded-[inherit] border border-white opacity-0 mix-blend-overlay transition-opacity duration-300 group-hover:opacity-100"
                        ></span
                        ><span
                          class="pointer-events-none absolute inset-0 rounded-[inherit] border border-gray-new-20 transition-opacity duration-300 group-hover:opacity-0"
                        ></span>

                        <!-- 上锁 -->
                        <div class="uplock" v-if="!isVip&&isSelect == 2">
                          <svg
                            t="1769588189685"
                            class="icon"
                            viewBox="0 0 1024 1024"
                            version="1.1"
                            xmlns="http://www.w3.org/2000/svg"
                            p-id="4907"
                            width="128"
                            height="128"
                          >
                            <path
                              d="M841.16024889 427.60192h-72.61297778V258.04003555c0-142.07431111-115.03616-257.53827555-256.55523556-257.53827555-141.50769778 0-256.66901333 115.46396445-256.66901333 257.53827555v169.56188445h-72.55608889c-35.00259555 0-63.35943111 28.47402667-63.35943111 63.61201778v464.33848889c0 35.18691555 28.35683555 63.67118222 63.35943111 63.67118222H841.22737778c35.00259555 0 63.36284445-28.48426667 63.36284444-63.67004444V491.2128c0-35.13799111-28.35911111-63.61315555-63.42997333-63.61315555z m-293.59217778 307.89859555v101.35779556c0 4.53973333-3.73873778 8.39338667-8.27847111 8.39338667h-54.52231111c-4.608 0-8.33536-3.85365333-8.33536-8.39338667v-101.35779556c-25.61479111-13.17546667-43.33909333-39.4752-43.33909334-70.31466666 0-43.71683555 35.3792-79.22119111 78.90033778-79.22119111 43.53365333 0 78.84686222 35.50435555 78.84686222 79.22005333 0.12174222 30.84060445-17.65831111 57.14033778-43.27310222 70.31466667z m122.48177778-307.89859555H353.93991111V262.20885333c0-87.48373333 71.00984889-158.67676445 158.12152889-158.67676444 87.16970667 0 157.98613333 71.19303111 157.98613333 158.67676444v165.39306667z"
                              fill="#00E599"
                              p-id="4908"
                            ></path>
                          </svg>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="no_data" v-if="isNaN">
                    {{isEn?'No data available':'暂无相关数据'}}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<!-- Tabler Core -->
<script src="../js/jquery-3.3.1.min.js" charset="UTF-8"></script>
<script src="./js/header.js"></script>
<script src="./js/cookies.js"></script>
<script src="./js/config.js"></script>

<script>
  $($(".left_navbar .nav_li")[0])
    .addClass("active")
    .siblings()
    .removeClass("active");
  $($(".top_navbar .nav_li")[0])
    .addClass("active")
    .siblings()
    .removeClass("active");
  $(".left_navbar .active img").attr(
    "src",
    "./static/b26.svg",
  );
  $(".top_navbar .active img").attr(
    "src",
    "./static/b26.svg",
  );

  var aiEmail = getCookie("aiEmail");
  var typeid = GetQueryString("id");

  if (!aiEmail) {
    location.href = `../login.html?redirect=${encodeURIComponent(location.href)}`;
  }

  if (!typeid) {
    location.href = `./promptlibrary.html`;
  }

  var app = new Vue({
    el: "#vue_app",
    data: {
      libraryName: "", // 搜索
      page: 1, //分页
      limit: 21, //每页条数
      libraryData: [], // 数据
      isEn: true, // 是否英文版
      isNew: false, // 是否展示新标签
      isNaN: false, // 是否有数据
      count: "", //总数
      NameEN: "", //英文名称
      NameCN: "", //中文名称
      loadingMore: false, // 是否正在加载更多
      allLoaded: false, // 是否加载完所有数据
      isLoading: false, //是否加载中
      logoUrl: "",
      isVip: false,
      isSelect: 1,
    },
    watch: {
      libraryName(newVal) {
        if (newVal === "") {
          this.page = 1;
          this.getListData(); // 输入清空时自动刷新
        }
      },
    },
    computed: {
      libraryDataSorted() {
        // 按时间倒序（最新的在前）
        const sorted = [...this.libraryData].sort((a, b) => {
          return new Date(b.CreateTime) - new Date(a.CreateTime);
        });

        // 给最新的两个标记 isNew
        return sorted.map((item, index) => ({
          ...item,
          isNew: index < 2,
        }));
      },
    },
    mounted() {
      let that = this;
      $.ajax({
        async: true,
        type: "POST",
        url: "https://promlib.net/api/auth/IsGoogleUser",
        dataType: "json",
        data: {
          Email: aiEmail,
        },
        success: function (data) {
          if (data == 1) {
            that.isVip = true;
          }
          that.getListData();
        },
      });

      // 滑动到底部加载更多
      window.addEventListener("scroll", this.handleScroll);
    },
    beforeDestroy() {
      window.removeEventListener("scroll", this.handleScroll);
    },
    methods: {
      //返回上一页
      libraryBack() {
        location.href = `./promptlibrary.html`;
      },

      // 搜索
      searchLibrary() {
        this.page = 1;
        $(".pageloader").attr(
          "style",
          "display: flex;background: rgba(0, 0, 0, 0.5);",
        );
        this.getListData(true);
      },

      //删除搜索
      deleteInput() {
        this.page = 1;
        this.libraryName = [];
        $(".pageloader").attr(
          "style",
          "display: flex;background: rgba(0, 0, 0, 0.5);",
        );
        this.getListData(true);
      },

      //切换免费版
      selectChage(val) {
        this.isLoading = true;
        this.isSelect = val;
        this.allLoaded = false;
        this.page = 1;
        this.getListData(true);
      },

      // 跳转详情页面
      goSubDetail(did) {
        location.href = `./promptlibraryDetail.html?typeid=${typeid}&did=${did}&isSelect=${this.isSelect}`;
      },

      // 获取列表
      getListData(reset = false) {
        let that = this;
        that.loadingMore = true;
        let url = `https://promlib.net/api/auth/GetTopHotPromptsByIndustry?categoryId=${typeid}`;
        if (this.isVip || this.isSelect == 2) {
          url = `https://promlib.net/api/auth/GetPagedPromptsByCategoryNew?pageIndex=${that.page}&pageSize=21&categoryId=${typeid}&searchKeyword=${that.libraryName}&IsVip=${this.isVip ? 1 : 0}`;
        }

        $.ajax({
          async: true,
          type: "POST",
          url: url,
          dataType: "json",
          success: function (data) {
            that.NameEN = data.CategoryName_EN;
            that.NameCN = data.CategoryName_CN;
            that.count = data.tableNumber || "";
            that.logoUrl = data.logoUrl;

            if (data.data.length == 0 && that.page == 1) {
              that.isNaN = true;
            } else {
              that.isNaN = false;
            }

            if (reset) {
              that.libraryData = data.data;
            } else {
              that.libraryData = that.libraryData.concat(data.data);
            }

            // 判断是否加载完
            if (data.data.length < that.limit || that.limit == that.count) {
              that.allLoaded = true;
            }

            setTimeout(function () {
              $(".pageloader").hide();
            }, 1500);
            that.loadingMore = false;
            that.isLoading = false;
          },
        });
      },

      // 滑动监听
      handleScroll() {
        if (this.loadingMore || this.allLoaded) return;
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const windowHeight = window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;

        // 距离底部 100px 时加载下一页
        if (scrollTop + windowHeight >= documentHeight - 100) {
          this.isLoading = true;
          this.page++;
          this.getListData(false);
        }
      },
    },
  });
</script>
